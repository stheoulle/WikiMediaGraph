services:
  postgres:
    image: postgres:16
    container_name: wikimedia-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wikimedia}
      POSTGRES_USER: ${POSTGRES_USER:-wikimedia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wikimedia}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wikimedia} -d ${POSTGRES_DB:-wikimedia}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redpanda:
    image: redpandadata/redpanda:v24.2.9
    container_name: wikimedia-redpanda
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --overprovisioned
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
      - --set
      - redpanda.auto_create_topics_enabled=false
    ports:
      - "19092:19092"
      - "9644:9644"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q Healthy"]
      interval: 5s
      timeout: 5s
      retries: 20

  producer:
    profiles: ["app"]
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: wikimedia-app:latest
    container_name: wikimedia-producer
    working_dir: /workspace
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://wikimedia:wikimedia@postgres:5432/wikimedia}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-edits.raw}
      SSE_URL: ${SSE_URL:-https://stream.wikimedia.org/v2/stream/recentchange}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONPATH: /workspace
    command: ["python", "-m", "app.producer.main"]
    depends_on:
      redpanda:
        condition: service_healthy

  consumer:
    profiles: ["app"]
    image: wikimedia-app:latest
    container_name: wikimedia-consumer
    working_dir: /workspace
    dns:
      - 1.1.1.1
      - 8.8.8.8
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://wikimedia:wikimedia@postgres:5432/wikimedia}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-redpanda:9092}
      KAFKA_TOPIC: ${KAFKA_TOPIC:-edits.raw}
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-wikimedia-consumer-v1}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PYTHONPATH: /workspace
    command: ["python", "-m", "app.consumer.main"]
    depends_on:
      redpanda:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  pg_data:
